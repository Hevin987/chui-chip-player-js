<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;
  flex-direction: row;
  width: 500px;
  gap: 10px;
  background: #eee;
}
.left {
  flex: 1;
  aspect-ratio: 3/2;
  background: pink;
}
.right {
  width: 150px;
  background: lightblue;
  display: flex;
  flex-direction: column;
}
.right-scroll {
  flex: 1;
  overflow-y: auto;
}
.content {
  height: 500px;
  background: yellow;
}
</style>
</head>
<body>
<div class="container">
  <div class="left">Left (Aspect Ratio 3/2)</div>
  <div class="right">
    <div class="right-scroll">
      <div class="content">Tall Content</div>
    </div>
  </div>
</div>
</body>
</html>
